<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Party Gag Multiverse — 24 random chaotic mini apps, games & IRL party madness">
  <meta name="theme-color" content="#0a0a12">
  <title>Party Gag Multiverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@700&family=Rubik+Wet+Paint&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/shell.css">
</head>
<body>
  <div id="app-root"></div>

  <button id="dev-trigger" aria-label="Dev trigger" title=""></button>

  <div id="dev-menu" hidden>
    <div class="dev-header">
      <h2>🛠 Party Gag Multiverse</h2>
      <button class="dev-close" id="dev-close">✕ CLOSE</button>
    </div>
    <p class="dev-stats" id="dev-stats"></p>
    <button class="dev-close" id="dev-reset" style="margin-bottom:1rem;background:#b8ff00;color:#000;width:100%">🔄 RESET CYCLE &amp; LAUNCH RANDOM</button>
    <div class="dev-grid" id="dev-grid"></div>
  </div>

  <script type="module">
    import('./js/launcher.js').catch((err) => {
      console.error(err);
      const root = document.getElementById('app-root');
      root.innerHTML = `
        <div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;font-family:sans-serif;color:#fff;background:#0a0a12;gap:1rem">
          <p style="font-size:3rem">💥</p>
          <h1 style="font-size:1.5rem;color:#ff2d95">Chaos failed to load</h1>
          <p style="opacity:0.8;max-width:300px;line-height:1.5">The party apps hit a snag. Refresh, or hold the bottom-left dot to open the app picker.</p>
          <button onclick="location.reload()" style="padding:0.8rem 1.5rem;font-size:1rem;border-radius:999px;border:3px solid #000;background:#b8ff00;cursor:pointer">REFRESH</button>
        </div>`;
    });
  </script>
</body>
</html>
