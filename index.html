<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Lumina Frame — Cinematic video production for brands that shine in the light.">
  <meta name="theme-color" content="#caf0f8">
  <meta property="og:title" content="Lumina Frame">
  <meta property="og:description" content="Cinematic video production. Bright stories. Bold results.">
  <title>Lumina Frame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <div class="sun" aria-hidden="true"></div>

  <div class="wave" aria-hidden="true">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 80C240 40 480 100 720 70C960 40 1200 90 1440 60V120H0V80Z" fill="rgba(142,202,230,0.25)"/>
      <path d="M0 95C360 55 720 105 1440 75V120H0V95Z" fill="rgba(255,249,240,0.6)"/>
    </svg>
  </div>

  <div class="page">
    <header class="nav">
      <a href="#" class="logo">Lumina <em>Frame</em></a>
      <a href="mailto:hello@luminaframe.studio?subject=Project%20Inquiry" class="nav-cta">Let's talk</a>
    </header>

    <main class="hero">
      <p class="eyebrow">Video production studio</p>
      <h1>Bright stories.<br><span>Shot in golden hour.</span></h1>
      <p class="hero-sub">We craft brand films and commercials with warmth, clarity, and the kind of light that makes people stop scrolling.</p>
      <div class="actions">
        <a href="mailto:hello@luminaframe.studio?subject=Book%20a%20Call" class="btn-primary">Book a free call</a>
        <button type="button" class="btn-ghost" id="open-reel" aria-label="Watch showreel">
          Watch showreel
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
        </button>
      </div>
    </main>

    <footer class="footer">
      <a href="mailto:hello@luminaframe.studio">hello@luminaframe.studio</a>
      <small>© 2026 · Los Angeles &amp; beyond</small>
    </footer>
  </div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Showreel">
    <div class="modal-box">
      <button type="button" class="modal-close" id="close-modal">Close</button>
      <video id="reel" controls playsinline poster="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200&q=80">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-waves-in-the-water-1164-large.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <script src="js/main.js" defer></script>
</body>
</html>
